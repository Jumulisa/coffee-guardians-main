<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Coffee Guardian</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #653321;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    h1 {
      color: #333;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      background: #653321;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover {
      background: #8B4513;
    }
    .tip {
      margin-top: 24px;
      padding: 16px;
      background: #FFF8DC;
      border-radius: 8px;
      font-size: 14px;
      color: #8B4513;
    }
    .tip strong {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M20 10.999h2C22 5.869 18.127 2 12.99 2v2C17.052 4 20 6.943 20 10.999z"/>
        <path d="M13 8c2.103 0 4 1.897 4 4h2c0-3.225-2.775-6-6-6v2z"/>
        <path d="M3 16.13v-1.18a10.67 10.67 0 0 1 8.56-10.43A12.03 12.03 0 0 1 13 4.36V2a13.98 13.98 0 0 0-2.23.18A12.68 12.68 0 0 0 1 14.95v1.43l2-.25z"/>
        <path d="m4.58 21.42 1.41-1.41L4.58 18.6l-1.41 1.41z"/>
        <circle cx="13" cy="12" r="2"/>
        <path d="M15.58 14.41 7.41 22.58l1.41 1.42 8.17-8.17-1.41-1.42z"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Please check your connection and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
    <div class="tip">
      <strong>Tip / Inama</strong>
      While offline, you can still view previously saved diagnoses from your history.
      <br><br>
      Iyo udafite internet, ushobora gusa kureba isuzuma ryabitswe mbere mu mateka yawe.
    </div>
  </div>
</body>
</html>
